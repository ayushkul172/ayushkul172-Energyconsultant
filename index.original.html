                      }
                  },

              if (currentRef) {

<!-- AK Energy Consultant - Enhanced Tracking with IP & Location -->
<script>
(function() {
    'use strict';
    
    const config = {
        endpoint: '/.netlify/functions/track',
        debug: true,
        respectDoNotTrack: true
    };
    
    function shouldTrack() {
        if (config.respectDoNotTrack && navigator.doNotTrack === '1') return false;
        const ua = navigator.userAgent.toLowerCase();
        if (['bot', 'crawler', 'spider'].some(bot => ua.includes(bot))) return false;
        return true;
    }
    
    function getSessionId() {
        let sid = sessionStorage.getItem('ak_sid');
        if (!sid) {
            sid = 'sess_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
            sessionStorage.setItem('ak_sid', sid);
        }
        return sid;
    }
    
    function getVisitorId() {
        let vid = localStorage.getItem('ak_vid');
        if (!vid) {
            vid = 'vis_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
            localStorage.setItem('ak_vid', vid);
        }
        return vid;
    }
    
    function getPerformanceData() {
        if (!window.performance || !window.performance.timing) return {};
        const timing = window.performance.timing;
        return {
            page_load_time: timing.loadEventEnd - timing.navigationStart,
            dom_ready_time: timing.domContentLoadedEventEnd - timing.navigationStart,
            dns_time: timing.domainLookupEnd - timing.domainLookupStart,
            tcp_time: timing.connectEnd - timing.connectStart,
            server_response_time: timing.responseEnd - timing.requestStart,
            dom_processing_time: timing.domComplete - timing.domLoading
        };
    }
    
    function trackEvent(eventName, customData = {}) {
        if (!shouldTrack()) return;
        
        const payload = {
            event: eventName,
            session_id: getSessionId(),
            visitor_id: getVisitorId(),
            
            // Page info
            page_url: window.location.href,
            page_path: window.location.pathname + window.location.search,
            page_title: document.title,
            referrer: document.referrer || 'Direct',
            
            // Screen & viewport
            screen_resolution: `${screen.width}x${screen.height}`,
            screen_color_depth: screen.colorDepth,
            viewport_size: `${window.innerWidth}x${window.innerHeight}`,
            pixel_ratio: window.devicePixelRatio || 1,
            
            // Browser capabilities
            language: navigator.language,
            languages: navigator.languages?.join(',') || navigator.language,
            timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
            timezone_offset: new Date().getTimezoneOffset(),
            
            // Device info
            platform: navigator.platform,
            user_agent: navigator.userAgent,
            cookies_enabled: navigator.cookieEnabled,
            online_status: navigator.onLine,
            do_not_track: navigator.doNotTrack,
            
            // Connection info (if available)
            connection_type: navigator.connection?.effectiveType || 'Unknown',
            connection_downlink: navigator.connection?.downlink || null,
            connection_rtt: navigator.connection?.rtt || null,
            save_data: navigator.connection?.saveData || false,
            
            // Hardware info (if available)
            hardware_concurrency: navigator.hardwareConcurrency || null,
            device_memory: navigator.deviceMemory || null,
            
            // Performance metrics
            ...getPerformanceData(),
            
            // Touch support
            touch_support: 'ontouchstart' in window || navigator.maxTouchPoints > 0,
            max_touch_points: navigator.maxTouchPoints || 0,
            
            // Custom data
            ...customData
        };
        
        fetch(config.endpoint, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload),
            keepalive: true
        })
        .then(response => response.json())
        .then(result => {
            if (config.debug) {
                console.log('‚úÖ Tracked:', eventName, result);
            }
        })
        .catch(err => {
            if (config.debug) console.error('‚ùå Track failed:', err);
        });
    }
    
    // Track page view
    trackEvent('page_view');
    
    // Track time on page
    let startTime = Date.now();
    window.addEventListener('beforeunload', () => {
        trackEvent('page_exit', { 
            time_on_page: Math.floor((Date.now() - startTime) / 1000)
        });
    });
    
    // Track clicks
    document.addEventListener('click', (e) => {
        if (e.target.tagName === 'A' || e.target.tagName === 'BUTTON') {
            trackEvent('click', {
                element: e.target.tagName,
                text: e.target.textContent?.substring(0, 50),
                href: e.target.href || '',
                id: e.target.id || '',
                class: e.target.className || ''
            });
        }
    });
    
    // Track scroll depth
    let maxScroll = 0;
    window.addEventListener('scroll', () => {
        const scrollPercent = Math.round((window.scrollY / (document.documentElement.scrollHeight - window.innerHeight)) * 100);
        if (scrollPercent > maxScroll) {
            maxScroll = scrollPercent;
        }
    });
    
    window.addEventListener('beforeunload', () => {
        if (maxScroll > 0) {
            trackEvent('scroll_depth', { max_scroll_percent: maxScroll });
        }
    });
    
    window.AKTracker = { track: trackEvent };
    
    if (config.debug) console.log('üöÄ Enhanced AK Tracker initialized');
})();
</script>
